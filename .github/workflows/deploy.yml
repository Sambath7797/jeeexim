name: Deploy React App

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Fix ajv module structure
        run: |
          # Create the missing directory structure
          mkdir -p node_modules/ajv/dist/compile
          # Create a symlink or copy the codegen file
          if [ -f node_modules/ajv/lib/compile/codegen.js ]; then
            cp node_modules/ajv/lib/compile/codegen.js node_modules/ajv/dist/compile/codegen.js
          elif [ -f node_modules/ajv/dist/compile/codegen.js ]; then
            echo "File already exists"
          else
            # Create a basic codegen module as fallback
            echo "module.exports = { CodeGen: class CodeGen { constructor() {} } };" > node_modules/ajv/dist/compile/codegen.js
          fi

      - name: Build app
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/build

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4
