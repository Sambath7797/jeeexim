name: Deploy React App

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Remove problematic modules
        run: |
          # Remove the problematic packages
          rm -rf node_modules/ajv
          rm -rf node_modules/ajv-formats
          rm -rf node_modules/schema-utils
          
          # Also remove them from package-lock.json by reinstalling
          npm uninstall ajv ajv-formats schema-utils --save

      - name: Reinstall specific working versions
        run: |
          # Install compatible versions
          npm install ajv@6.12.6 --save-exact --legacy-peer-deps
          npm install ajv-formats@1.6.1 --save-exact --legacy-peer-deps
          npm install schema-utils@3.3.0 --save-exact --legacy-peer-deps

      - name: Build app
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/build

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4
